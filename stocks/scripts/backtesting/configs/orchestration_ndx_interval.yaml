orchestration:
  name: "NDX Multi-Algo Interval System"
  lookback_days: 250
  daily_budget: 200000
  output_dir: results/orchestrated_ndx_interval

  # Interval mode configuration
  phase2_mode: interval              # "daily" or "interval"
  interval_minutes: 5
  interval_budget_mode: decaying     # remaining_daily / remaining_intervals
  selection_mode: top_n
  top_n: 3

  # Equity data for intraday price context
  equity_data:
    NDX: equities_output/I:NDX
    SPX: equities_output/I:SPX
    TQQQ: equities_output/TQQQ

  # Exit rules for position tracking
  exit_rules:
    profit_target_pct: 0.50          # exit at 50% of max credit captured
    stop_loss_pct: 2.0               # exit at 2x credit lost
    proximity_pct: 0.005             # roll when within 0.5% of short strike
    time_exit_utc: "20:30"           # force exit at 3:30 PM ET
    roll_check_start_utc: "18:00"    # start checking rolls at 11 AM PST

  # Shared trigger definitions (referenced by name in instances)
  triggers:
    vix_low:
      type: vix_regime
      params:
        allowed_regimes: [low]
        vix_csv_dir: equities_output/I:VIX
        vix_lookback: 60
    vix_normal:
      type: vix_regime
      params:
        allowed_regimes: [normal]
    vix_high_extreme:
      type: vix_regime
      params:
        allowed_regimes: [high, extreme]
    weekday_mon_tue:
      type: day_of_week
      params:
        days: [0, 1]
    always:
      type: always

  # Sub-orchestrator groups
  groups:
    - name: index_0dte
      selection_mode: best_score
      budget_share: 0.50
      instances:
        - algo: percentile_entry
          id: v3:NDX:p95_dte0
          config: credit_spread_0dte_ndx.yaml
          overrides:
            percentile: 95
            dte: 0
            ticker: NDX
          triggers: [always]
          priority: 5

        - algo: iv_regime_condor
          id: ic:NDX:p85
          config: iv_regime_condor_ndx.yaml
          overrides:
            iron_condor_percentile: 85
          triggers: [vix_low, vix_normal]
          priority: 3

    - name: weekly
      selection_mode: best_score
      budget_share: 0.20
      instances:
        - algo: weekly_iron_condor
          id: wic:NDX:p80
          config: weekly_iron_condor_ndx.yaml
          triggers: [weekday_mon_tue]
          priority: 4

  # Direct (ungrouped) instances
  instances:
    - algo: tail_hedged_credit_spread
      id: hedge:NDX:p95
      config: tail_hedged_ndx.yaml
      triggers: [vix_high_extreme]
      priority: 1
      budget_share: 0.30

    - algo: tqqq_momentum_scalper
      id: tqqq:combined
      config: tqqq_momentum_scalper.yaml
      triggers: [always]
      priority: 6
      budget_share: 0.20
