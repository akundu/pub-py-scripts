infra:
  ticker: NDX
  lookback_days: 250
  output_dir: results/tail_hedged_ndx

providers:
  - name: csv_equity
    role: equity
    params:
      csv_dir: equities_output
  - name: csv_options
    role: options
    params:
      csv_dir: options_csv_output
      dte_buckets: [0]

strategy:
  name: tail_hedged_credit_spread
  params:
    # Main spread
    percentile: 95
    hedge_percentile: 99        # Far-OTM hedge strike
    lookback: 120
    dte: 0
    spread_width: 50
    hedge_spread_width: 50

    # Hedge sizing
    base_hedge_pct: 0.05        # 5% of credit allocated to hedge
    vix_csv_dir: equities_output/I:VIX
    vix_lookback: 60

    # Entry
    option_types: [put, call]
    entry_start_utc: "13:00"
    entry_end_utc: "17:00"
    interval_minutes: 10

    # Position sizing
    num_contracts: 1
    max_loss_estimate: 10000
    min_credit: 0.30
    use_mid: true

constraints:
  budget:
    max_spend_per_transaction: 20000
    daily_budget: 100000
  trading_hours:
    entry_start: "13:00"
    entry_end: "17:00"
    forced_exit_time: "20:45"
  exit_rules:
    profit_target_pct: 0.50
    stop_loss_pct: 2.0
    time_exit: "20:30"
    mode: first_triggered

report:
  formats: [console, csv]
  metrics: [win_rate, roi, sharpe, max_drawdown, profit_factor]
