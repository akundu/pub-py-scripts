<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{SYMBOL}} chart</title>
<script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
<!-- flatpickr: calendar-dropdown date pickers (~30KB, MIT) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/themes/dark.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --up: #26a69a;
    --down: #ef5350;
    --accent: #58a6ff;
    --accent-active: #1f6feb;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro",
                 system-ui, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
  }
  header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .preset-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    padding: 6px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .preset-btn {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    transition: background 0.1s, border-color 0.1s;
  }
  .preset-btn:hover { border-color: var(--accent); }
  .preset-btn.active {
    background: var(--accent-active);
    border-color: var(--accent-active);
    color: #fff;
  }
  .controls-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .controls-row label { color: var(--muted); }
  .controls-row input[type="date"], .controls-row select,
  .controls-row input[type="number"] {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 13px;
    font-family: inherit;
  }
  .controls-row button.apply {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    padding: 5px 12px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
  }
  .stats-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .stat { display: flex; flex-direction: column; min-width: 60px; }
  .stat-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
  .stat-value { font-variant-numeric: tabular-nums; font-weight: 600; }
  .stat-value.up { color: var(--up); }
  .stat-value.down { color: var(--down); }
  #chart-wrap {
    position: relative;
    height: calc(100vh - 230px);
    min-height: 400px;
  }
  #chart { width: 100%; height: 100%; }
  #tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(22, 27, 34, 0.95);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    line-height: 1.5;
    min-width: 180px;
    z-index: 10;
    display: none;
    font-variant-numeric: tabular-nums;
  }
  #tooltip .tt-time { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  #tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; }
  #tooltip .tt-label { color: var(--muted); }
  #tooltip .tt-up { color: var(--up); }
  #tooltip .tt-down { color: var(--down); }
  #status {
    position: absolute;
    top: 10px;
    left: 10px;
    color: var(--muted);
    font-size: 12px;
    pointer-events: none;
    background: rgba(22, 27, 34, 0.85);
    padding: 4px 8px;
    border-radius: 4px;
  }
  #hint {
    position: absolute;
    bottom: 10px;
    right: 10px;
    color: var(--muted);
    font-size: 11px;
    pointer-events: none;
    background: rgba(22, 27, 34, 0.7);
    padding: 3px 8px;
    border-radius: 4px;
    opacity: 0.8;
  }
  /* Shift+drag selection overlay — sits on top of the chart, only
     captures mouse events while Shift is held so normal pan/zoom stays
     intact. */
  #sel-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }
  #sel-overlay.active {
    pointer-events: auto;
    cursor: crosshair;
  }
  #sel-box {
    position: absolute;
    background: rgba(88, 166, 255, 0.18);
    border-left: 1px solid var(--accent);
    border-right: 1px solid var(--accent);
    pointer-events: none;
    display: none;
  }
  /* Live-price block next to the symbol header. Updates via WebSocket
     during market hours (mirrors the /stock_info pattern); falls back
     to the most recent close when the market is closed. After-hours
     section only shows when there's actual AH movement to report. */
  #live-price {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-left: auto;
    font-variant-numeric: tabular-nums;
  }
  #live-amount {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  #live-change {
    font-size: 14px;
    font-weight: 600;
  }
  #live-change.up { color: var(--up); }
  #live-change.down { color: var(--down); }
  #live-ah {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    padding: 2px 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    border: 1px solid var(--border);
  }
  #live-ah.up { color: var(--up); border-color: rgba(38,166,154,0.4); }
  #live-ah.down { color: var(--down); border-color: rgba(239,83,80,0.4); }
  #live-status {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    transition: background 0.2s;
  }
  #live-status.connected { background: var(--up); box-shadow: 0 0 6px var(--up); }
  #live-status.disconnected { background: var(--down); }
  /* Clickable symbol header + autocomplete popover. The header swaps
     with a search input on click; the popover under the input shows
     ranked ticker/name matches from /api/tickers/search. */
  #symbol-header {
    cursor: pointer;
    user-select: none;
    transition: color 0.1s;
    margin: 0;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  #symbol-header:hover { color: var(--accent); }
  #symbol-header::after {
    content: " ▾";
    color: var(--muted);
    font-size: 14px;
    font-weight: 400;
  }
  #symbol-search {
    position: relative;
    display: none;
  }
  #symbol-search-input {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    width: 220px;
    outline: none;
  }
  #symbol-search-results {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    min-width: 320px;
    max-height: 360px;
    overflow-y: auto;
    z-index: 100;
  }
  #symbol-search-results:empty { display: none; }
  .search-result {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    padding: 8px 12px;
    cursor: pointer;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .search-result:last-child { border-bottom: none; }
  .search-result:hover, .search-result.active {
    background: var(--accent-active);
    color: #fff;
  }
  .search-result .sym {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
    flex: 0 0 auto;
  }
  .search-result .name {
    color: var(--muted);
    font-size: 12px;
    text-align: right;
    flex: 1 1 auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .search-result.active .name,
  .search-result:hover .name { color: rgba(255,255,255,0.85); }
  .search-empty {
    color: var(--muted);
    padding: 8px 12px;
    font-size: 12px;
    font-style: italic;
  }
  /* flatpickr in our dark theme — slightly tighter and matched colors */
  .flatpickr-input { width: 110px; }
  .flatpickr-calendar.dark {
    background: var(--panel);
    border: 1px solid var(--border);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  /* Big loading overlay — shows for any user-initiated reload (preset
     click, range change, interval change). Sits between the chart and
     the tooltip, so it dims the now-stale chart and signals work in
     progress. Pan-to-load-more uses a quieter inline pill instead. */
  #loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(13, 17, 23, 0.78);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 8;
    flex-direction: column;
    gap: 14px;
    pointer-events: all;
  }
  #loading-overlay.visible { display: flex; }
  #loading-overlay .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  #loading-overlay .label {
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    text-align: center;
    max-width: 80%;
    line-height: 1.5;
  }
  #loading-overlay .sublabel {
    color: var(--muted);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Dim controls + preset buttons while a load is in flight, so a slow
     6-month fetch can't stack requests via repeated clicks. */
  body.loading .preset-btn,
  body.loading .controls-row button.apply,
  body.loading .controls-row select {
    opacity: 0.5;
    pointer-events: none;
  }
  @media (max-width: 700px) {
    header h1 { font-size: 16px; }
    .preset-btn { padding: 4px 8px; font-size: 11px; }
    #chart-wrap { height: calc(100vh - 280px); }
  }
</style>
</head>
<body>
<header>
  <h1 id="symbol-header" tabindex="0" title="Click to change symbol — autocomplete on ticker or company name">{{SYMBOL}}</h1>
  <div id="symbol-search">
    <input type="text" id="symbol-search-input" placeholder="ticker or company name…" autocomplete="off">
    <div id="symbol-search-results"></div>
  </div>
  <div id="live-price">
    <span id="live-status" title="Live price status"></span>
    <span id="live-amount">—</span>
    <span id="live-change"></span>
    <span id="live-ah" style="display:none"></span>
  </div>
</header>
<div class="preset-row" id="preset-row">
  <!-- Buttons populated by JS so the active state stays in sync -->
</div>
<div class="controls-row">
  <label for="start-input">Start</label>
  <input type="text" id="start-input" value="{{START_DATE}}" placeholder="YYYY-MM-DD" autocomplete="off">
  <label for="end-input">End</label>
  <input type="text" id="end-input" value="{{END_DATE}}" placeholder="YYYY-MM-DD" autocomplete="off">
  <label for="interval-input">Interval</label>
  <select id="interval-input">
    <!-- Auto is the default — server-side picks the coarsest interval
         that still shows useful detail for the requested span. The
         explicit picks below are the user's escape hatch. -->
    <option value="auto" selected>Auto</option>
    <option value="5m">5m</option>
    <option value="15m">15m</option>
    <option value="30m">30m</option>
    <option value="1h">1h</option>
    <option value="D">Daily</option>
  </select>
  <label for="rsi-window">RSI</label>
  <input type="number" id="rsi-window" min="2" max="100" value="14" style="width:60px">
  <button class="apply" id="apply-btn">Apply</button>
  <span id="source-pill" style="color: var(--muted); font-size: 11px;"></span>
</div>
<div class="stats-row" id="stats-row"></div>
<div id="chart-wrap">
  <div id="chart"></div>
  <div id="sel-overlay"><div id="sel-box"></div></div>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="label" id="loading-label">Loading…</div>
    <div class="sublabel" id="loading-sublabel"></div>
  </div>
  <div id="tooltip"></div>
  <div id="status"></div>
  <div id="hint">Shift+drag = zoom into range · Drag past edges = load more</div>
</div>

<script>
(function () {
  const SYMBOL = {{SYMBOL_JSON}};
  const $ = (id) => document.getElementById(id);

  // ── Period preset buttons. Order matches the user's requested list:
  //    daily | 1W | 1M | 3M | 6M | YTD | 1Y | 2Y
  // ─────────────────────────────────────────────────────────────────
  const PRESETS = [
    { key: "1d",  label: "Daily" },
    { key: "1w",  label: "1W" },
    { key: "1m",  label: "1M" },
    { key: "3m",  label: "3M" },
    { key: "6m",  label: "6M" },
    { key: "ytd", label: "YTD" },
    { key: "1y",  label: "1Y" },
    { key: "2y",  label: "2Y" },
  ];
  const presetRow = $("preset-row");
  PRESETS.forEach(p => {
    const b = document.createElement("button");
    b.className = "preset-btn";
    b.textContent = p.label;
    b.dataset.preset = p.key;
    b.addEventListener("click", () => loadFromPreset(p.key));
    presetRow.appendChild(b);
  });
  function setActivePreset(key) {
    [...presetRow.querySelectorAll(".preset-btn")].forEach(b => {
      b.classList.toggle("active", b.dataset.preset === key);
    });
  }

  // ── Chart setup ─────────────────────────────────────────────────────
  const wrap = document.getElementById("chart");
  wrap.style.display = "flex";
  wrap.style.flexDirection = "column";
  const priceDiv = document.createElement("div");
  priceDiv.style.flex = "1 1 70%";
  priceDiv.style.minHeight = "200px";
  const rsiDiv = document.createElement("div");
  rsiDiv.style.flex = "0 0 30%";
  rsiDiv.style.minHeight = "100px";
  rsiDiv.style.borderTop = "1px solid #30363d";
  wrap.appendChild(priceDiv);
  wrap.appendChild(rsiDiv);

  const baseOpts = {
    layout: {
      background: { color: "#0d1117" },
      textColor: "#e6edf3",
      attributionLogo: false,
    },
    grid: {
      vertLines: { color: "#21262d" },
      horzLines: { color: "#21262d" },
    },
    rightPriceScale: { borderColor: "#30363d" },
    timeScale: {
      borderColor: "#30363d",
      timeVisible: true,
      secondsVisible: false,
      // Axis tick labels use Lightweight Charts' `tickMarkType` to
      // pick the right format per tick: LC tells us whether *this* tick
      // is a year/month/day boundary or a sub-day time tick, and we
      // format accordingly. So a multi-day intraday chart shows day
      // labels at midnight crossings and time labels in between — the
      // user can always tell what day they're hovering over.
      //   tickMarkType: 0=Year, 1=Month, 2=DayOfMonth, 3=Time, 4=TimeWithSeconds
      // Lightweight Charts handles drag-to-pan and wheel/pinch-to-zoom
      // natively. The user's "drag w/in a chart to get the detailed view"
      // is just that — once a wide preset is loaded, drag-zoom drills in
      // without needing a server round-trip.
      tickMarkFormatter: (time, tickMarkType) => {
        const d = new Date(time * 1000);
        const fmtDate = (withYear) => d.toLocaleDateString("en-US", {
          timeZone: "America/New_York",
          month: "short", day: "numeric",
          year: withYear ? "numeric" : undefined,
        });
        const fmtTime = () => d.toLocaleTimeString("en-US", {
          timeZone: "America/New_York",
          hour: "2-digit", minute: "2-digit", hour12: false,
        });
        // Year boundaries (and >1y spans) include the year for context.
        const longSpan = lastSpan > 365;
        if (tickMarkType === 0) return fmtDate(true);                // Year
        if (tickMarkType === 1) return fmtDate(longSpan);            // Month
        if (tickMarkType === 2) return fmtDate(false);               // Day
        // Sub-day time ticks: usually just HH:MM, but on multi-day
        // intraday charts a "13:30" alone is ambiguous — it could be
        // any of the days on screen. So we prepend an abbreviated date
        // when the loaded span is more than one day. This is exactly
        // the "show hours but also the date" behavior the user asked
        // for.
        if (lastSpan > 1) return `${fmtDate(false)} ${fmtTime()}`;
        return fmtTime();
      },
    },
    crosshair: { mode: 1 /* Magnet */ },
    autoSize: true,
  };
  const priceChart = LightweightCharts.createChart(priceDiv, baseOpts);
  const rsiChart = LightweightCharts.createChart(rsiDiv, {
    ...baseOpts,
    timeScale: { ...baseOpts.timeScale, visible: false },
  });
  const candleSeries = priceChart.addCandlestickSeries({
    upColor: "#26a69a", downColor: "#ef5350",
    borderUpColor: "#26a69a", borderDownColor: "#ef5350",
    wickUpColor: "#26a69a", wickDownColor: "#ef5350",
  });
  const volumeSeries = priceChart.addHistogramSeries({
    priceFormat: { type: "volume" },
    priceScaleId: "vol",
    color: "rgba(88, 166, 255, 0.4)",
  });
  priceChart.priceScale("vol").applyOptions({
    scaleMargins: { top: 0.85, bottom: 0 },
  });
  const rsiSeries = rsiChart.addLineSeries({
    color: "#bb8fce", lineWidth: 2,
    priceFormat: { type: "price", precision: 2, minMove: 0.01 },
  });
  rsiSeries.createPriceLine({ price: 70, color: "#ef5350", lineWidth: 1,
                                lineStyle: 2, axisLabelVisible: true,
                                title: "70" });
  rsiSeries.createPriceLine({ price: 30, color: "#26a69a", lineWidth: 1,
                                lineStyle: 2, axisLabelVisible: true,
                                title: "30" });

  // Sync time range between price and RSI panes — drag/zoom on either
  // mirrors to the other.
  let syncing = false;
  priceChart.timeScale().subscribeVisibleLogicalRangeChange((r) => {
    if (syncing || !r) return;
    syncing = true;
    rsiChart.timeScale().setVisibleLogicalRange(r);
    syncing = false;
  });
  rsiChart.timeScale().subscribeVisibleLogicalRangeChange((r) => {
    if (syncing || !r) return;
    syncing = true;
    priceChart.timeScale().setVisibleLogicalRange(r);
    syncing = false;
  });

  // Crosshair tooltip
  const tooltip = $("tooltip");
  let lastBars = [];
  let lastRsi = [];
  let lastStats = {};
  let currentInterval = {{INTERVAL_JSON}};
  let lastSpan = 1;

  const fmtNum = (v, d = 2) =>
    v == null || Number.isNaN(v) ? "—" : Number(v).toFixed(d);
  const fmtPct = (v) =>
    v == null || Number.isNaN(v) ? "—" : (v >= 0 ? "+" : "") + Number(v).toFixed(2) + "%";
  const dirClass = (v) => (v == null || v === 0) ? "" : (v > 0 ? "tt-up" : "tt-down");

  function rsiAtTime(t) {
    let lo = 0, hi = lastRsi.length - 1, hit = null;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (lastRsi[mid].time === t) { hit = lastRsi[mid]; break; }
      if (lastRsi[mid].time < t) lo = mid + 1; else hi = mid - 1;
    }
    return hit ? hit.value : null;
  }

  priceChart.subscribeCrosshairMove((param) => {
    if (!param || !param.point || !param.time || !param.seriesData) {
      tooltip.style.display = "none";
      return;
    }
    const c = param.seriesData.get(candleSeries);
    if (!c) { tooltip.style.display = "none"; return; }
    const v = param.seriesData.get(volumeSeries);
    const rsi = rsiAtTime(param.time);
    const dayOpen = lastStats.day_open;
    const prev = lastStats.prev_close;
    const vsOpen = (dayOpen != null) ? (c.close - dayOpen) / dayOpen * 100 : null;
    const vsPrev = (prev != null) ? (c.close - prev) / prev * 100 : null;
    const d = new Date(param.time * 1000);
    const tsFmt = currentInterval === "D"
      ? d.toLocaleDateString("en-US", { timeZone: "America/New_York",
          year: "numeric", month: "short", day: "numeric" })
      : d.toLocaleString("en-US", { timeZone: "America/New_York",
          month: "short", day: "numeric", hour: "2-digit",
          minute: "2-digit", hour12: false }) + " ET";
    tooltip.innerHTML =
      `<div class="tt-time">${tsFmt}</div>` +
      `<div class="tt-row"><span class="tt-label">Open</span><span>${fmtNum(c.open)}</span></div>` +
      `<div class="tt-row"><span class="tt-label">High</span><span>${fmtNum(c.high)}</span></div>` +
      `<div class="tt-row"><span class="tt-label">Low</span><span>${fmtNum(c.low)}</span></div>` +
      `<div class="tt-row"><span class="tt-label">Close</span><span>${fmtNum(c.close)}</span></div>` +
      (v != null ? `<div class="tt-row"><span class="tt-label">Vol</span><span>${fmtNum(v.value, 0)}</span></div>` : "") +
      (rsi != null ? `<div class="tt-row"><span class="tt-label">RSI</span><span>${fmtNum(rsi, 1)}</span></div>` : "") +
      `<div class="tt-row"><span class="tt-label">vs open</span><span class="${dirClass(vsOpen)}">${fmtPct(vsOpen)}</span></div>` +
      `<div class="tt-row"><span class="tt-label">vs prev close</span><span class="${dirClass(vsPrev)}">${fmtPct(vsPrev)}</span></div>`;
    const wrapRect = wrap.getBoundingClientRect();
    let x = param.point.x + 18, y = param.point.y + 18;
    if (x + 200 > wrapRect.width) x = param.point.x - 200;
    if (y + 200 > wrapRect.height) y = param.point.y - 200;
    tooltip.style.left = `${Math.max(0, x)}px`;
    tooltip.style.top = `${Math.max(0, y)}px`;
    tooltip.style.display = "block";
  });

  function renderStats(s) {
    const row = $("stats-row");
    if (!s) { row.innerHTML = ""; return; }
    const cells = [
      { label: "Prev Close", val: fmtNum(s.prev_close) },
      { label: "Open", val: fmtNum(s.day_open) },
      { label: "High", val: fmtNum(s.day_high) },
      { label: "Low", val: fmtNum(s.day_low) },
      { label: "Close", val: fmtNum(s.day_close) },
      { label: "Δ vs Prev", val: fmtPct(s.change_vs_prev_close_pct),
        cls: dirClass(s.change_vs_prev_close_pct) },
      { label: "Range", val: fmtPct(s.intraday_range_pct) },
    ];
    if (s.vwap != null) cells.push({ label: "VWAP", val: fmtNum(s.vwap) });
    row.innerHTML = cells.map(c =>
      `<div class="stat"><span class="stat-label">${c.label}</span>` +
      `<span class="stat-value ${c.cls || ""}">${c.val}</span></div>`
    ).join("");
  }

  // ── URL state sync ──────────────────────────────────────────────────
  // Keep the page URL in sync with the current view so it can be
  // bookmarked / shared / back-button-navigated. We use `replaceState`
  // (not `pushState`) so each control change replaces the URL in place
  // instead of polluting the back stack with one entry per keystroke.
  // Manual range and presets coexist: a preset click stores `range=...`,
  // a manual change stores `start=...&end=...`. Whichever the user did
  // most recently wins on reload.
  function buildShareUrlParams(params) {
    // Strip empty values so the URL stays compact.
    const cleaned = new URLSearchParams();
    for (const [k, v] of Object.entries(params)) {
      if (v !== undefined && v !== null && String(v).length > 0) {
        cleaned.set(k, String(v));
      }
    }
    return cleaned;
  }
  function syncUrl(params) {
    const qs = buildShareUrlParams(params);
    const newPath = `/chart/${encodeURIComponent(SYMBOL)}` +
      (qs.toString() ? `?${qs.toString()}` : "");
    if (newPath !== location.pathname + location.search) {
      history.replaceState({chartParams: params}, "", newPath);
    }
  }
  // Restore form state from URL on first load + on browser back/forward.
  function loadFromUrl() {
    const u = new URL(location.href);
    const range = u.searchParams.get("range");
    const start = u.searchParams.get("start");
    const end = u.searchParams.get("end");
    const interval = u.searchParams.get("interval");
    const rsi = u.searchParams.get("rsi_window");
    if (interval) $("interval-input").value = interval;
    if (rsi) $("rsi-window").value = rsi;
    if (range) {
      loadFromPreset(range);
      return true;
    }
    if (start && end) {
      $("start-input").value = start;
      $("end-input").value = end;
      loadFromManualRange();
      return true;
    }
    return false;
  }
  window.addEventListener("popstate", () => loadFromUrl());

  // ── Loading overlay helpers ─────────────────────────────────────────
  // Mirror of common/chart_data.py::pick_interval_for_span so the loading
  // screen can predict what the server is about to send. Keep these two
  // tables in sync — the unit test in test_chart_data.py pins the Python
  // side, so client/server divergence shows up as a visible mismatch.
  function autoIntervalForSpan(spanDays) {
    if (spanDays <= 1) return "5m";
    if (spanDays <= 5) return "30m";
    if (spanDays <= 30) return "1h";
    return "D";
  }
  // Best-effort estimate from the request params (range preset OR
  // start/end). Returns null if we can't tell — caller falls back to a
  // generic "auto" label.
  function predictAutoInterval(params) {
    if (params.range) {
      const days = {
        "1d": 1, "1w": 7, "1m": 30, "3m": 90, "6m": 180,
        "1y": 365, "2y": 730,
      }[params.range];
      if (days != null) return autoIntervalForSpan(days);
      if (params.range === "ytd") {
        const now = new Date();
        const jan1 = new Date(now.getFullYear(), 0, 1);
        return autoIntervalForSpan(Math.round((now - jan1) / 86400000));
      }
    }
    if (params.start && params.end) {
      const s = new Date(params.start), e = new Date(params.end);
      const days = Math.max(0, Math.round((e - s) / 86400000));
      return autoIntervalForSpan(days);
    }
    return null;
  }
  function describeLoad(params) {
    // Friendly text for the spinner — "Loading 6M of NDX (D bars)" is
    // more reassuring during a slow daily-table query than "loading".
    const presetNames = {
      "1d": "Daily", "1w": "1 week", "1m": "1 month", "3m": "3 months",
      "6m": "6 months", "ytd": "year-to-date", "1y": "1 year", "2y": "2 years",
    };
    let scope;
    if (params.range && presetNames[params.range]) scope = presetNames[params.range];
    else if (params.start && params.end) scope = `${params.start} → ${params.end}`;
    else scope = "data";
    return `Loading ${scope} of ${SYMBOL}`;
  }
  function showLoading(params) {
    $("loading-label").textContent = describeLoad(params);
    let sublabel;
    if (!params.interval || params.interval === "auto") {
      const predicted = predictAutoInterval(params);
      sublabel = predicted
        ? `auto · ~${predicted} bars expected`
        : "interval: auto";
    } else {
      sublabel = `${params.interval} bars`;
    }
    $("loading-sublabel").textContent = sublabel;
    $("loading-overlay").classList.add("visible");
    document.body.classList.add("loading");
  }
  function hideLoading() {
    $("loading-overlay").classList.remove("visible");
    document.body.classList.remove("loading");
  }

  // ── Data fetching ───────────────────────────────────────────────────
  async function fetchAndRender(params) {
    showLoading(params);
    const qs = new URLSearchParams(params).toString();
    // Push the params into the address bar before the network round-trip
    // so a copy-paste mid-load still produces a valid shareable URL.
    syncUrl(params);
    try {
      const url = `/api/chart/${encodeURIComponent(SYMBOL)}?${qs}`;
      const resp = await fetch(url, { headers: { "Accept": "application/json" }});
      if (!resp.ok) {
        const txt = await resp.text();
        $("status").textContent = `Error ${resp.status}: ${txt.slice(0, 200)}`;
        $("status").style.display = "block";
        candleSeries.setData([]); volumeSeries.setData([]); rsiSeries.setData([]);
        renderStats(null);
        return;
      }
      const data = await resp.json();
      lastBars = data.bars || [];
      lastRsi = data.rsi || [];
      lastStats = data.stats || {};
      currentInterval = data.interval || "5m";
      // Span in days for the tick formatter to know date-vs-time labels.
      const sd = new Date(data.start), ed = new Date(data.end);
      lastSpan = Math.max(1, Math.round((ed - sd) / 86400000) + 1);

      // Sync the form to whatever the server actually used (resolves
      // `range=` presets and `interval=auto` server-side, then displays
      // back so the controls match the view). flatpickr owns the start/end
      // values so we go through its setter to avoid firing onChange.
      //
      // We deliberately do NOT overwrite the interval dropdown here.
      // Doing so used to break this flow:
      //   1. user clicks 1D → server resolves auto→5m → dropdown becomes "5m"
      //   2. user clicks 3M → handler reads dropdown ("5m") and sends
      //      interval=5m → server honors the explicit pick → fetches
      //      thousands of 5m bars instead of daily.
      // The actually-loaded interval shows up in the corner status pill
      // ("179 bars · 1h · …") so the user can still see it; the dropdown
      // stays as the user's *intent* ("Auto" or an explicit pick).
      setPickerDates(data.start, data.end);

      candleSeries.setData(lastBars);
      volumeSeries.setData(lastBars.map(b => ({
        time: b.time, value: b.volume || 0,
        color: (b.close >= b.open ? "rgba(38, 166, 154, 0.45)"
                                  : "rgba(239, 83, 80, 0.45)"),
      })));
      rsiSeries.setData(lastRsi);
      renderStats(lastStats);
      priceChart.timeScale().fitContent();
      rsiChart.timeScale().fitContent();
      $("source-pill").textContent = data.source
        ? `source: ${data.source}` : "";
      // Tiny confirmation pill in the corner — "127 bars · 1h · 2026-04-01 → 2026-04-30"
      // — fades after a moment so the chart isn't cluttered. The full
      // loading overlay above is the primary "loaded" signal.
      $("status").textContent = lastBars.length
        ? `${lastBars.length} bars · ${currentInterval} · ${data.start} → ${data.end}`
        : `No data for ${data.start} → ${data.end}`;
      $("status").style.display = "block";
      if (lastBars.length) setTimeout(() => { $("status").style.display = "none"; }, 1500);
    } catch (e) {
      $("status").textContent = `Error: ${e.message}`;
      $("status").style.display = "block";
    } finally {
      hideLoading();
    }
  }

  function loadFromPreset(key) {
    setActivePreset(key);
    const rsiW = Math.max(2, parseInt($("rsi-window").value || "14", 10));
    const interval = $("interval-input").value;  // "auto" by default
    fetchAndRender({
      range: key,
      interval: interval,
      rsi_window: String(rsiW),
    });
  }

  function loadFromManualRange() {
    setActivePreset(null);  // clear preset highlight
    const start = $("start-input").value;
    const end = $("end-input").value;
    if (!start || !end) return;
    const rsiW = Math.max(2, parseInt($("rsi-window").value || "14", 10));
    const interval = $("interval-input").value;
    fetchAndRender({
      start: start,
      end: end,
      interval: interval,
      rsi_window: String(rsiW),
    });
  }

  $("apply-btn").addEventListener("click", loadFromManualRange);
  // The text-type inputs no longer fire `change` from flatpickr; flatpickr
  // calls `onChange` directly (set up below), so we don't bind the input
  // events here. The interval / RSI inputs are still vanilla HTML.
  $("interval-input").addEventListener("change", loadFromManualRange);
  $("rsi-window").addEventListener("change", loadFromManualRange);

  // ── Calendar-dropdown date pickers (flatpickr) ──────────────────────
  // flatpickr replaces the native date input with a polished, dark-themed
  // calendar overlay. Range mode would put both pickers on one input —
  // we keep them separate so the user can adjust either side without
  // re-opening a combined picker.
  let suppressFpChange = false;  // re-entrancy guard while we sync values
  const fpStart = flatpickr("#start-input", {
    dateFormat: "Y-m-d",
    allowInput: true,
    onChange: () => { if (!suppressFpChange) loadFromManualRange(); },
  });
  const fpEnd = flatpickr("#end-input", {
    dateFormat: "Y-m-d",
    allowInput: true,
    onChange: () => { if (!suppressFpChange) loadFromManualRange(); },
  });
  // Helper used after fetchAndRender to push the resolved server dates
  // back into the pickers without re-firing onChange.
  function setPickerDates(startStr, endStr) {
    suppressFpChange = true;
    try {
      if (startStr) fpStart.setDate(startStr, false);
      if (endStr)   fpEnd.setDate(endStr, false);
    } finally {
      suppressFpChange = false;
    }
  }

  // ── Live price (WebSocket) ──────────────────────────────────────────
  // Mirrors the /stock_info pattern: connect to /ws?symbol=… and update
  // the header price on every quote_update. The WebSocket emits an
  // initial_price_update on connect so the header isn't blank for long.
  // The change-vs-prev-close and after-hours diff need today's daily
  // open/close as a reference, so we kick off a one-shot fetch to the
  // chart endpoint for the most recent week of daily bars.
  // ─────────────────────────────────────────────────────────────────
  let liveWs = null;
  let liveWsReconnectTimer = null;
  let referencePrices = { prev_close: null, day_close: null,
                          day_close_date: null };
  let lastLivePrice = null;

  function fmtMoney(n) {
    if (n == null || !Number.isFinite(n)) return "—";
    // Two-decimal places with thousands separators — mirrors the
    // /stock_info ticker display.
    return n.toLocaleString("en-US", {
      minimumFractionDigits: 2, maximumFractionDigits: 2,
    });
  }
  function fmtSignedPct(diff, base) {
    if (diff == null || base == null || !Number.isFinite(base) || base === 0) return "";
    const pct = (diff / base) * 100;
    const sign = diff >= 0 ? "+" : "";
    return `${sign}${diff.toFixed(2)} (${sign}${pct.toFixed(2)}%)`;
  }

  // ET market sessions:
  //   regular: 09:30–16:00 weekdays (real-time price)
  //   after-hours: 16:00–20:00 weekdays (AH section visible)
  //   pre-market / overnight / weekend: just show prev close vs current
  function _etTimeParts() {
    const fmt = new Intl.DateTimeFormat("en-US", {
      timeZone: "America/New_York", hour12: false,
      hour: "2-digit", minute: "2-digit", weekday: "short",
    }).formatToParts(new Date());
    const parts = {};
    for (const p of fmt) parts[p.type] = p.value;
    return {
      hour: parseInt(parts.hour || "0", 10),
      minute: parseInt(parts.minute || "0", 10),
      isWeekday: !["Sat", "Sun"].includes(parts.weekday),
    };
  }
  function isMarketOpen() {
    const t = _etTimeParts();
    if (!t.isWeekday) return false;
    const m = t.hour * 60 + t.minute;
    return m >= 9 * 60 + 30 && m < 16 * 60;
  }
  function isAfterHoursNow() {
    const t = _etTimeParts();
    if (!t.isWeekday) return false;
    return t.hour >= 16 && t.hour < 20;
  }
  function todayET() {
    // YYYY-MM-DD in ET (so we can tell if `referencePrices.day_close`
    // is today's regular close or yesterday's stale entry).
    return new Intl.DateTimeFormat("en-CA", {
      timeZone: "America/New_York", year: "numeric",
      month: "2-digit", day: "2-digit",
    }).format(new Date());
  }

  function renderLivePrice() {
    const elAmount = $("live-amount");
    const elChange = $("live-change");
    const elAh = $("live-ah");
    if (lastLivePrice == null) {
      elAmount.textContent = "—";
      elChange.textContent = "";
      elChange.className = "";
      elAh.style.display = "none";
      return;
    }
    elAmount.textContent = fmtMoney(lastLivePrice);

    // Total change vs prior trading day's close. Always shown when we
    // have prev_close — relevant whether the market is open or closed.
    const pc = referencePrices.prev_close;
    if (pc != null && pc > 0) {
      const diff = lastLivePrice - pc;
      elChange.textContent = fmtSignedPct(diff, pc);
      elChange.className = diff >= 0 ? "up" : "down";
    } else {
      elChange.textContent = "";
      elChange.className = "";
    }

    // After-hours pill — only shown when:
    //   (a) we are in the AH window in ET, and
    //   (b) we have today's regular close as reference (the daily bar
    //       for today must already be in daily_prices, otherwise
    //       day_close === prev_close and the AH math is meaningless).
    const dc = referencePrices.day_close;
    const dcDate = referencePrices.day_close_date;
    const showAh = isAfterHoursNow()
                 && dc != null && dc > 0
                 && dcDate === todayET();
    if (showAh) {
      const ahDiff = lastLivePrice - dc;
      elAh.textContent = `AH ${fmtSignedPct(ahDiff, dc)}`;
      elAh.className = ahDiff >= 0 ? "up" : "down";
      elAh.style.display = "inline-block";
    } else {
      elAh.style.display = "none";
    }
  }

  async function loadReferencePrices() {
    // One-shot fetch of last week's daily bars. Gives us prev_close and
    // day_close (the most recent daily bar's close + the date that bar
    // belongs to). Using interval=D & rsi=false keeps the payload tiny
    // (~5 bars + stats); the chart's main fetch is unrelated to this.
    try {
      const u = new URL(`/api/chart/${encodeURIComponent(SYMBOL)}`,
                          location.origin);
      u.searchParams.set("range", "1m");      // wide enough to always have a recent daily bar
      u.searchParams.set("interval", "D");
      u.searchParams.set("rsi", "false");
      const resp = await fetch(u.toString());
      if (!resp.ok) return;
      const data = await resp.json();
      const stats = data.stats || {};
      const days = data.trading_days_returned || [];
      referencePrices = {
        prev_close: stats.prev_close,
        day_close:  stats.day_close,
        day_close_date: days.length ? days[days.length - 1] : null,
      };
      renderLivePrice();
    } catch (e) {
      console.warn("loadReferencePrices failed", e);
    }
  }

  function setLiveStatus(connected) {
    const el = $("live-status");
    if (connected) {
      el.className = "connected";
      el.title = "Live (WebSocket connected)";
    } else {
      el.className = "disconnected";
      el.title = "Live (disconnected — reconnecting)";
    }
  }

  function initLiveWebSocket() {
    if (liveWs) {
      try { liveWs.close(); } catch (e) {}
      liveWs = null;
    }
    if (liveWsReconnectTimer) {
      clearTimeout(liveWsReconnectTimer);
      liveWsReconnectTimer = null;
    }
    try {
      const wsProto = location.protocol === "https:" ? "wss:" : "ws:";
      const url = `${wsProto}//${location.host}/ws?symbol=${encodeURIComponent(SYMBOL)}`;
      liveWs = new WebSocket(url);
      liveWs.onopen = () => setLiveStatus(true);
      liveWs.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          // Server shape: {symbol, data: {payload: [{price, timestamp}, …]}}
          // Subscribed as "NDX" but the broadcaster sends to both raw
          // (I:NDX) and normalized (NDX) forms, so any form matches.
          const payload = msg && msg.data && msg.data.payload;
          if (Array.isArray(payload) && payload.length > 0) {
            const p = parseFloat(payload[0].price);
            if (Number.isFinite(p)) {
              lastLivePrice = p;
              renderLivePrice();
            }
          }
        } catch (e) {}
      };
      liveWs.onerror = () => {};  // reported via onclose
      liveWs.onclose = () => {
        setLiveStatus(false);
        // Auto-reconnect with a small backoff. Mirrors the /stock_info
        // page's behavior so transient network blips heal silently.
        liveWsReconnectTimer = setTimeout(initLiveWebSocket, 5000);
      };
    } catch (e) {
      console.warn("initLiveWebSocket failed", e);
    }
  }

  // Refresh the AH pill on a slow tick so it appears the moment we
  // cross 4pm ET (otherwise we'd only repaint on the next quote).
  setInterval(renderLivePrice, 60_000);

  // Kick off both the reference-price fetch and the WS at page load.
  loadReferencePrices();
  initLiveWebSocket();

  // ── Shift+drag selection: pick a finer time window without leaving
  //    the chart. Lightweight Charts uses plain drag for pan, so we
  //    require the Shift modifier to disambiguate. While Shift is held,
  //    a transparent overlay above the chart captures mouse events and
  //    paints a translucent selection rectangle. On mouseup we convert
  //    the pixel x-coords back to timestamps and reload the chart at the
  //    new (typically narrower) window. The handler picks finer granularity
  //    automatically when interval=auto, which it is by default — so
  //    selecting a single day's worth on a monthly chart drills into
  //    intraday bars in one gesture.
  // ─────────────────────────────────────────────────────────────────
  const selOverlay = $("sel-overlay");
  const selBox = $("sel-box");
  const chartWrap = $("chart-wrap");
  // The overlay has to live inside the same positioned ancestor as the
  // chart canvases so its (0,0) matches the chart's. priceDiv is that
  // ancestor; relocate the overlay there.
  priceDiv.style.position = "relative";
  priceDiv.appendChild(selOverlay);

  let shiftHeld = false;
  function setOverlayActive(active) {
    selOverlay.classList.toggle("active", active);
  }
  document.addEventListener("keydown", (e) => {
    if (e.key === "Shift" && !shiftHeld) { shiftHeld = true; setOverlayActive(true); }
  });
  document.addEventListener("keyup", (e) => {
    if (e.key === "Shift") { shiftHeld = false; setOverlayActive(false); selBox.style.display = "none"; selStartX = null; }
  });
  // Visibility-change can desync the modifier state (alt-tab while held);
  // safer to release on blur.
  window.addEventListener("blur", () => { shiftHeld = false; setOverlayActive(false); });

  let selStartX = null;
  selOverlay.addEventListener("mousedown", (e) => {
    if (!shiftHeld) return;
    selStartX = e.offsetX;
    selBox.style.left = selStartX + "px";
    selBox.style.top = "0";
    selBox.style.width = "0px";
    selBox.style.height = "100%";
    selBox.style.display = "block";
    e.preventDefault();
  });
  selOverlay.addEventListener("mousemove", (e) => {
    if (selStartX == null) return;
    const x = e.offsetX;
    selBox.style.left = Math.min(selStartX, x) + "px";
    selBox.style.width = Math.abs(x - selStartX) + "px";
  });
  function finishSelection(endX) {
    if (selStartX == null) return;
    const x = endX;
    selBox.style.display = "none";
    const x1 = Math.min(selStartX, x), x2 = Math.max(selStartX, x);
    selStartX = null;
    if (x2 - x1 < 5) return;  // tiny drag, treat as click
    const t1 = priceChart.timeScale().coordinateToTime(x1);
    const t2 = priceChart.timeScale().coordinateToTime(x2);
    if (!t1 || !t2 || t2 <= t1) return;
    // unix-second numbers → YYYY-MM-DD (UTC; the loader speaks UTC dates)
    const startStr = new Date(t1 * 1000).toISOString().slice(0, 10);
    const endStr = new Date(t2 * 1000).toISOString().slice(0, 10);
    setActivePreset(null);
    setPickerDates(startStr, endStr);
    // Leaving interval=auto so the server picks finer granularity for the
    // narrower span — that's the whole point of zooming in.
    loadFromManualRange();
  }
  selOverlay.addEventListener("mouseup",   (e) => finishSelection(e.offsetX));
  selOverlay.addEventListener("mouseleave", (e) => { if (selStartX != null) finishSelection(e.offsetX); });

  // ── Pan-to-load-more: when the user pans the chart past the edge of
  //    what's loaded, fetch the adjacent window and merge it in. Uses
  //    `subscribeVisibleTimeRangeChange` (fires on every pan tick) with
  //    a debounce so we don't spam the server. One in-flight request at
  //    a time. Skipped during the initial render (lastBars empty) and
  //    while a Shift+drag selection is in progress.
  // ─────────────────────────────────────────────────────────────────
  let prefetchTimer = null;
  let prefetching = false;
  function debouncePrefetch(range) {
    if (prefetchTimer) clearTimeout(prefetchTimer);
    prefetchTimer = setTimeout(() => maybePrefetch(range), 300);
  }
  async function maybePrefetch(range) {
    if (prefetching || !range || lastBars.length === 0 || selStartX != null) return;
    const firstT = lastBars[0].time;
    const lastT  = lastBars[lastBars.length - 1].time;
    const span = Math.max(1, lastT - firstT);  // unix-second span
    // Only act when the user has actually scrolled past the data, not
    // just close to the edge. ~5% margin avoids triggering every tick
    // when the visible range fits exactly.
    const marginSec = span * 0.05;
    let extendBack = false, extendFwd = false;
    if (range.from < firstT - marginSec) extendBack = true;
    if (range.to   > lastT  + marginSec) extendFwd = true;
    if (!extendBack && !extendFwd) return;

    // Extend by half the current loaded span on whichever side(s) the
    // user has scrolled into. This keeps merges bounded — the chart
    // always grows by a predictable chunk regardless of how far past
    // the edge the user pans.
    const bumpSec = Math.max(86400, Math.floor(span / 2));  // min 1 day
    let newStart = firstT, newEnd = lastT;
    if (extendBack) newStart = Math.max(0, firstT - bumpSec);
    if (extendFwd)  newEnd   = lastT + bumpSec;
    // Don't extend past today.
    const todayT = Math.floor(Date.now() / 1000);
    if (newEnd > todayT) newEnd = todayT;

    const startStr = new Date(newStart * 1000).toISOString().slice(0, 10);
    const endStr   = new Date(newEnd   * 1000).toISOString().slice(0, 10);
    // If we couldn't actually extend (already at today + already at
    // earliest available), bail.
    if (startStr === fpStart.input.value && endStr === fpEnd.input.value) return;

    prefetching = true;
    try {
      const qs = new URLSearchParams({
        start: startStr, end: endStr,
        interval: currentInterval,  // keep the same granularity on extension
        rsi_window: String($("rsi-window").value || "14"),
      }).toString();
      const url = `/api/chart/${encodeURIComponent(SYMBOL)}?${qs}`;
      const resp = await fetch(url, { headers: { "Accept": "application/json" }});
      if (!resp.ok) return;
      const data = await resp.json();
      if (!data.bars || data.bars.length === 0) return;
      // Merge by time-key so existing bars are preserved on overlap.
      const byTime = new Map(lastBars.map(b => [b.time, b]));
      for (const b of data.bars) byTime.set(b.time, b);
      lastBars = [...byTime.values()].sort((a, b) => a.time - b.time);
      const rsiByTime = new Map(lastRsi.map(r => [r.time, r]));
      for (const r of (data.rsi || [])) rsiByTime.set(r.time, r);
      lastRsi = [...rsiByTime.values()].sort((a, b) => a.time - b.time);
      candleSeries.setData(lastBars);
      volumeSeries.setData(lastBars.map(b => ({
        time: b.time, value: b.volume || 0,
        color: b.close >= b.open ? "rgba(38, 166, 154, 0.45)"
                                  : "rgba(239, 83, 80, 0.45)",
      })));
      rsiSeries.setData(lastRsi);
      // Update the form to reflect the now-broader loaded window so the
      // URL/share-state stays accurate.
      setPickerDates(
        new Date(lastBars[0].time * 1000).toISOString().slice(0, 10),
        new Date(lastBars[lastBars.length - 1].time * 1000).toISOString().slice(0, 10),
      );
      syncUrl({
        start: fpStart.input.value, end: fpEnd.input.value,
        interval: currentInterval,
        rsi_window: $("rsi-window").value || "14",
      });
      $("source-pill").textContent = `source: ${data.source} (extended)`;
    } finally {
      prefetching = false;
    }
  }
  priceChart.timeScale().subscribeVisibleTimeRangeChange(debouncePrefetch);

  // ── Symbol-search autocomplete ──────────────────────────────────────
  // Click the symbol header → a search input pops up that hits
  // /api/tickers/search?q=… on every keystroke (150ms debounce). Each
  // result row is "TICKER" left, "Company name" right; clicking or
  // pressing Enter on a row navigates to /chart/<symbol>. Esc cancels.
  // Arrow keys move the highlight; Enter on the bare input (no result
  // highlighted) submits whatever was typed (caps + trim) so power-users
  // can skip the menu for known tickers.
  const symHeader = $("symbol-header");
  const symSearch = $("symbol-search");
  const symInput  = $("symbol-search-input");
  const symResults = $("symbol-search-results");
  let symActive = -1;     // index of highlighted row in symLastResults
  let symLastResults = [];
  let symSearchTimer = null;
  let symInFlight = null;  // AbortController for the current request

  function openSymbolSearch() {
    symHeader.style.display = "none";
    symSearch.style.display = "inline-block";
    symInput.value = "";
    symActive = -1;
    symLastResults = [];
    symResults.innerHTML = "";
    symInput.focus();
  }
  function closeSymbolSearch() {
    symHeader.style.display = "";
    symSearch.style.display = "none";
    symResults.innerHTML = "";
    symActive = -1;
    if (symInFlight) { symInFlight.abort(); symInFlight = null; }
  }
  symHeader.addEventListener("click", openSymbolSearch);
  symHeader.addEventListener("keydown", (e) => {
    // Keyboard activation for accessibility (header has tabindex=0).
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      openSymbolSearch();
    }
  });

  function navigateToSymbol(sym) {
    if (!sym) return;
    // Preserve the current view (range / start / end / interval) when
    // changing symbols. The new chart loads on the same window so a
    // user can scan ticker by ticker without losing their place.
    const u = new URL(location.href);
    u.pathname = `/chart/${encodeURIComponent(sym.toUpperCase())}`;
    location.href = u.toString();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;",
      '"': "&quot;", "'": "&#39;",
    }[c]));
  }

  function renderSymResults() {
    if (!symLastResults.length) {
      symResults.innerHTML =
        `<div class="search-empty">No matches — press Enter to load anyway</div>`;
      return;
    }
    symResults.innerHTML = symLastResults.map((r, i) =>
      `<div class="search-result ${i === symActive ? "active" : ""}" ` +
      `data-idx="${i}" data-sym="${escapeHtml(r.symbol)}">` +
      `<span class="sym">${escapeHtml(r.symbol)}</span>` +
      `<span class="name">${escapeHtml(r.name || "")}</span></div>`
    ).join("");
    symResults.querySelectorAll(".search-result").forEach(el => {
      el.addEventListener("click", () => navigateToSymbol(el.dataset.sym));
      el.addEventListener("mouseenter", () => {
        symActive = parseInt(el.dataset.idx, 10);
        [...symResults.children].forEach((c, i) =>
          c.classList.toggle("active", i === symActive));
      });
    });
  }

  async function runSymbolSearch() {
    const q = symInput.value.trim();
    if (!q) {
      symLastResults = [];
      symResults.innerHTML = "";
      symActive = -1;
      return;
    }
    if (symInFlight) symInFlight.abort();
    symInFlight = new AbortController();
    try {
      const resp = await fetch(
        `/api/tickers/search?q=${encodeURIComponent(q)}&limit=10`,
        { signal: symInFlight.signal },
      );
      symInFlight = null;
      if (!resp.ok) return;
      const data = await resp.json();
      symLastResults = data.results || [];
      symActive = symLastResults.length ? 0 : -1;
      renderSymResults();
    } catch (e) {
      // AbortError on rapid keypress; ignore.
      if (e.name !== "AbortError") console.error(e);
    }
  }

  symInput.addEventListener("input", () => {
    if (symSearchTimer) clearTimeout(symSearchTimer);
    symSearchTimer = setTimeout(runSymbolSearch, 150);
  });
  symInput.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      e.preventDefault();
      closeSymbolSearch();
      return;
    }
    if (e.key === "Enter") {
      e.preventDefault();
      if (symActive >= 0 && symLastResults[symActive]) {
        navigateToSymbol(symLastResults[symActive].symbol);
      } else {
        // Empty results or no highlight → just trust whatever the user
        // typed. Lets you go straight to /chart/AVGO without waiting
        // for the search to populate.
        const raw = symInput.value.trim();
        if (raw) navigateToSymbol(raw);
      }
      return;
    }
    if (e.key === "ArrowDown" && symLastResults.length) {
      e.preventDefault();
      symActive = (symActive + 1) % symLastResults.length;
      renderSymResults();
    } else if (e.key === "ArrowUp" && symLastResults.length) {
      e.preventDefault();
      symActive = (symActive - 1 + symLastResults.length) % symLastResults.length;
      renderSymResults();
    }
  });

  // Click outside (anywhere not inside the search widget) closes the
  // popover. Listen on mousedown so the click that lands on a result
  // row still fires its own handler before the close.
  document.addEventListener("mousedown", (e) => {
    if (symSearch.style.display === "none") return;
    if (symSearch.contains(e.target) || e.target === symHeader) return;
    closeSymbolSearch();
  });

  // Initial load: prefer URL params (so a deep-linked /chart/NDX?range=1m
  // opens on that view) and fall back to the server-supplied start/end
  // placeholders for plain `/chart/NDX` visits.
  if (!loadFromUrl()) {
    const initialStart = $("start-input").value;
    const initialEnd = $("end-input").value;
    if (initialStart === initialEnd) {
      setActivePreset("1d");  // single-day default → highlight "Daily"
    }
    loadFromManualRange();
  }
})();
</script>
</body>
</html>
