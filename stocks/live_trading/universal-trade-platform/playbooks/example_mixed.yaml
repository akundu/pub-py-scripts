playbook:
  name: "Morning Entries — Mixed Trade Types"
  description: "Demonstrates all 5 trade types: equity, single option, credit spread, debit spread, iron condor"
  broker: ibkr

instructions:
  - id: buy_spy
    type: equity
    action: BUY
    symbol: SPY
    quantity: 100
    order_type: MARKET

  - id: spx_put_spread
    type: credit_spread
    symbol: SPX
    expiration: "2026-03-20"
    short_strike: 5500
    long_strike: 5475
    option_type: PUT
    quantity: 2
    net_price: 3.50

  - id: spy_long_put
    type: single_option
    symbol: SPY
    expiration: "2026-03-20"
    strike: 550
    option_type: PUT
    action: BUY_TO_OPEN
    quantity: 1
    order_type: LIMIT
    limit_price: 2.50

  - id: spx_condor
    type: iron_condor
    symbol: SPX
    expiration: "2026-03-20"
    put_short: 5500
    put_long: 5475
    call_short: 5700
    call_long: 5725
    quantity: 1
    net_price: 3.50

  - id: qqq_debit
    type: debit_spread
    symbol: QQQ
    expiration: "2026-03-20"
    long_strike: 480
    short_strike: 490
    option_type: CALL
    quantity: 3
    net_price: 4.00
