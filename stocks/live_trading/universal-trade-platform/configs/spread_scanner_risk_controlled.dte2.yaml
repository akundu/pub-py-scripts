# Spread Scanner — Risk-Controlled Reference Config
#
# Encodes the risk-controlled policy this repo's analysis converged on:
#   - market hours PT (06:31-10:00 window for trading, scanner runs anytime)
#   - ROI band 1.5-5%
#   - per-ticker OTM floor >= 1%
#   - per-ticker credit floor (SPX 0.50 / NDX 1.00 / RUT 0.40)
#   - one trade per minute per ticker, trusted prev_close required
#   - $400k total risk cap with per-ticker sub-caps
#   - 1 contract, LIMIT order at the observed credit
#
# All trade submissions route through utp.py's TradingClient to the UTP daemon.
# The daemon decides paper vs live (via `python utp.py daemon --paper|--live`);
# the scanner inherits that mode.
#
# Usage:
#   python spread_scanner.py --config configs/spread_scanner_risk_controlled.yaml
#
# To go live: flip the `trade` handler from the commented block below into the
# `handlers:` list. Leaving it commented keeps you in simulate-only mode.

# ── Service endpoints (primary localhost, fallback to lin1) ──────────────────
# Workstation deployment: prefer the locally-running daemon / db_server /
# percentile server, then fall back to lin1.kundu.dev when the local
# instance isn't up. Probed once at scanner startup; the winning URL is
# cached for the lifetime of the process.
daemon_url:
  primary: http://localhost:8000
  backup:  http://lin1.kundu.dev:8000
db_url:
  primary: http://localhost:9102
  backup:  http://lin1.kundu.dev:9102
percentile_url:
  primary: http://localhost:9100
  backup:  http://lin1.kundu.dev:9100

# ── Scanner screening ─────────────────────────────────────────────────────────
tickers: [SPX, NDX, RUT]
dte: [2]
types: [put, call]
widths:
  # DTE=2 strike grids are coarser than DTE=0/1 — SPX lists 10-pt multiples
  # at moderate-OTM, NDX only publishes 50-pt multiples at far-OTM. Widths
  # MUST be multiples of the exchange grid or `build_spread_from_chain`
  # returns "missing" because the long-leg strike literally isn't listed.
  # (At DTE=0/1 strikes are finer, so width=25/60 works there.)
  SPX: 30        # lands on 10-pt multiples; DTE=2 grid has them
  NDX: 60        # NDX DTE=2 far-OTM publishes only 50-pt multiples
  RUT: 30        # RUT still on 5-pt grid — unchanged
#otm_pcts: [0.75, 1.0, 1.5, 2.0]
interval: 60
top: 5

# ── Provider re-verify freshness ─────────────────────────────────────────────
# Each Top-N candidate (and every spread fed to a trade/simulate handler) is
# re-checked against the IBKR provider before display/firing. Both legs must
# have an IBKR-cached quote at most this many seconds old, otherwise the
# daemon refreshes from the broker. CSV-sourced fallback quotes are always
# rejected at this gate (require_provider_source=True is enforced internally).
# 2DTE: gap risk over multiple sessions dominates; intraday quote freshness
# is least critical here. 60s threshold matches DTE=1.
verify_max_age_sec: 45
verify_require_provider_source: false

# ── Risk-tier filter (applies to top-picks + all handlers) ───────────────────
# Requires `tiers: true` so tier data is fetched from db_server. Short-strike
# must sit inside the named tier's safety band for that ticker.
#
# Two forms are accepted for min_tier / min_tier_close:
#   1) Named tier — maps to the server's recommended percentile:
#        conservative (cons / c) — widest safety band, fewest picks (~p98)
#        moderate     (mod  / m) — middle ground                    (~p95)
#        aggressive   (aggr / a) — narrowest band, most picks       (~p90)
#   2) Raw percentile pN where N is 1-99 (e.g. p40, p75, p95):
#        Reads directly from /range_percentiles `pct` map — no mapping layer.
#        Higher N = safer (further OTM). p95 is roughly "moderate-to-cons",
#        p75 is around "aggressive", p40 is close-to-the-money / risky.
#        Useful when you want finer control than the three named tiers.
#
# Distinction between the two fields:
#   min_tier       — intraday (today's price-path), updates through the day
#   min_tier_close — close-to-close historical model (anchored to prev close)
# Leaving them null = no tier filter.
tiers: true
#min_tier: moderate         # or a percentile e.g. p95, p75, p40
min_tier_close: p90          # close-to-close variant

# ── Absolute OTM floor (scanner-level) ───────────────────────────────────────
# 2DTE has more time for mean reversion than 1DTE, but that also means two
# overnight sessions of gap risk. We set a slightly TIGHTER-than-DTE-1 floor
# on NDX because a 2-day adverse move can be larger in absolute terms.
# Effective floor = max(min_otm, min_otm_per_ticker[sym]).
min_otm: 2.0                   # baseline: 2% OTM
#min_otm_per_ticker:            # per-ticker overrides — higher wins
#  NDX: 3.0                     # NDX needs more buffer on a 2-day horizon
#  RUT: 2.25

# ── Action handlers ──────────────────────────────────────────────────────────
handlers:
  # Always-on: append every scan's qualifying spreads to JSONL for replay/analysis.
  - type: log
    min_norm_roi: 2.5
    path: nROI.log.jsonl

  # Email on higher-threshold hits, gated to market hours.
  #- type: notify
  #  min_norm_roi: 3.5
  #  email: anirbankundu@gmail.com
  #  gate_market_hours: true
  #  # Per-handler pre-fire price validation (default false). When true, the
  #  # handler re-fetches a fresh quote from the daemon for every candidate
  #  # immediately before sending the email; failed verifications are dropped.
  #  # Reuses the global `verify_max_age_sec` and `verify_require_provider_source`.
  #  validate_prices: false

  # Shadow-mode: margin-check every would-have-traded spread; never submits.
  # Same policy as the live `trade` handler so the two logs are directly
  # comparable (shadow vs actual).
  - type: simulate_trade
    # Per-handler pre-fire price validation (default false). When true, every
    # candidate gets a fresh `verify_spread_pricing` round-trip immediately
    # before the simulated submit; failed verifications are dropped before
    # any risk reservation. Useful when you want the simulate log to be
    # faithful to what a live handler would have seen post-validation.
    #validate_prices: true
    # Flat nROI floor tuned from 2026-04-22 session analysis. DTE=2 had
    # the healthiest inherent ratio (~9.3% credit/risk — a 91.5%
    # break-even WR, quite forgiving) but today's session traded
    # NDX-only because the threshold was 3.0 and SPX/RUT max out well
    # below that. Today's p75 nROI: NDX=3.23, SPX=1.67, RUT=1.67.
    # 2.25 catches the top quartile of NDX and the upper tail of SPX/RUT.
    # Remember nROI = ROI / 3 at DTE=2, so 2.25 ≈ 6.75% ROI floor.
    #
    # The schedule + per-ticker resolver fields still work — swap the
    # scalar for `min_norm_roi_schedule: [...]` to get time-of-day
    # behavior, or populate `min_norm_roi_per_ticker` to tune per ticker
    # (SPX/RUT would benefit — their p75 is only 1.67).
    min_norm_roi: 2.5
    # Per-ticker overrides — feature plumbed in but OFF.
    # When ready, e.g.:
    #   min_norm_roi_per_ticker:
    #     NDX: 2.5             # NDX has headroom; stay picky
    #     SPX: 1.5             # SPX p75=1.67 — otherwise nearly excluded
    #     RUT: 1.0             # RUT p75=1.67 too — include upper tail
    # Values may be scalars OR their own schedules.
    min_norm_roi_per_ticker: {}
    log_file: trades_sim_dte2.jsonl
    daemon_url: http://localhost:8000
    policy: &trade_policy
      roi_pct: [3, 10.0]
      min_otm_pct:  {SPX: 2.5, NDX: 2.75, RUT: 4.0}
      min_credit:   {SPX: 0.5, NDX: 1.0, RUT: 0.35}
      max_total_risk: 300000
      max_per_ticker_risk: {SPX: 140000, NDX: 180000, RUT: 120000}
      # Dollar cap on RISK PER TRADE. The handler computes
      #   contracts = max(1, floor(max_risk_per_trade / per_contract_max_loss))
      # so a larger budget sizes up the trade instead of placing multiple
      # separate trades. If a ticker is omitted from this map, the default
      # is `spread.width * 100` (≈ 1 contract's worst-case loss).
      # One trade per ticker fires per scan cycle; `contracts` is the knob.
      max_risk_per_trade:
        SPX: 5000        # ≈ 2-3 contracts (SPX width 20 → $2000/contract max loss)
        NDX: 12000       # ≈ 2 contracts (NDX width 50 → $5000/contract)
        RUT: 5000        # ≈ 2 contracts (RUT width 25 → $2500/contract)
      require_prev_close: true
      # MARKET: immediate fill at the prevailing NBBO credit.
      # LIMIT:  submit at the observed credit; may not fill.
      order_type: MARKET
      stop_loss_multiplier: 2.0
      trading_window_pt:
        start: "06:31"
        end:   "11:30"

  # Live trading — uncomment to activate. Uses the SAME policy as simulate_trade
  # via the YAML anchor above.
  # - type: trade
  #   min_norm_roi: 1.5
  #   log_file: trades_live.jsonl
  #   daemon_url: http://localhost:8000
  #   policy: *trade_policy
  #   # Per-handler pre-fire price validation (default false). For LIVE trading,
  #   # turning this on adds a final sanity check right before order submission:
  #   # if the verify call fails (csv_source_rejected, non_monotonic, no_edge),
  #   # the trade is silently skipped instead of submitted on stale data.
  #   # Strongly recommended for live mode.
  #   validate_prices: true
