# Market Data Streaming Configuration
#
# Used with: python utp.py daemon --live --streaming-config configs/streaming_default.yaml
#
# Subscribes to IBKR market data and publishes ticks to Redis and/or QuestDB
# in the same format as polygon_realtime_streamer.py.
#
# IBKR limits (with 50% safety buffer):
#   - Max 50 subscriptions (IBKR standard ~100 market data lines)
#   - 22 msg/sec rate limit (IBKR soft limit 50 msg/sec)

# ── Symbols to stream ───────────────────────────────────────────────────────
# Simple string form: auto-detects index vs stock
# Dict form: {symbol: SPX, sec_type: IND, exchange: CBOE}
symbols:
  # Major indices (auto-detected as IND with correct exchange)
  - RUT
  - NDX
  - SPX
  #- DJX
  #- VIX
  #- VIX1D

  # Major ETFs (auto-detected as STK on SMART)
  #- SPY
  #- QQQ
  #- IWM
  #- DIA
  #- TQQQ

# ── Persistence targets ──────────────────────────────────────────────────────

# Redis Pub/Sub — publishes to channels: realtime:quote:{SYMBOL}, realtime:trade:{SYMBOL}
# Same format as polygon_realtime_streamer.py
redis_enabled: true
redis_url: "redis://lin1.kundu.dev:6379/0"
redis_channel_prefix: "realtime"

# QuestDB direct write — inserts into realtime_data table
# Set questdb_url to enable (same connection string as QUEST_DB_STRING)
questdb_enabled: false
questdb_url: ""
# Example: questdb_url: "questdb://stock_user:stock_password@lin1.kundu.dev:8812/stock_data"

# ── Timing ────────────────────────────────────────────────────────────────────

# How often to flush buffered ticks to persistence (seconds)
tick_batch_interval: 0.5

# Minimum seconds between Redis publishes per symbol (default: 1.0)
# Ticks arriving faster are buffered; the latest value is published when the interval elapses.
redis_publish_interval: 1.0

# Only stream during US market hours (9:30 AM - 4:00 PM ET)
market_hours_only: true

# ── WebSocket ─────────────────────────────────────────────────────────────────

# Broadcast ticks to /ws/quotes WebSocket clients
ws_broadcast_enabled: true

# ── Safety limits (50% buffer on IBKR limits) ────────────────────────────────

# Max simultaneous market data subscriptions (IBKR allows ~100)
max_subscriptions: 50

# Max messages per second to IBKR API (IBKR limit is 50)
rate_limit_msg_sec: 22.0

# Hard price gate: reject any tick outside 60%-140% of previous close.
# Also self-corrects: if 50+ ticks are rejected, re-seeds prev_close.
# This field is kept for backward compat but the gate is now hardcoded at 60%-140%.
close_band_pct: 0.40

# ── Tick streaming mode ────────────────────────────────────────────────────
# How to stream real-time price ticks for configured symbols.
#
# "auto"      — use ib_insync (reqMktData) if TWS connected, else CPG WebSocket
# "websocket" — force CPG WebSocket streaming (wss://gateway/v1/api/ws)
# "polling"   — force CPG snapshot polling (/iserver/marketdata/snapshot)
streaming_mode: auto

# Seconds between snapshot polls (only used when streaming_mode=polling)
cpg_poll_interval: 2.0

# ── Option quote streaming (background pre-fetch) ─────────────────────────
# When enabled, the daemon continuously pre-fetches option quotes for streaming
# symbols and caches them for instant serving via CLI and REST endpoints.

# Enable background option quote streaming
option_quotes_enabled: true

# Seconds between CSV read cycles (reads tail of CSV files for latest prices)
option_quotes_poll_interval: 15

# Seconds between IBKR overlay fetches (live prices + greeks from broker)
option_quotes_greeks_interval: 60

# Strike range as percentage of current price (e.g., 5.0 = ±5%)
option_quotes_strike_range_pct: 5.0

# Number of upcoming expirations to fetch per symbol
option_quotes_num_expirations: 6  # Cover DTE 0 through 5

# CSV exports as primary fast source for option bid/ask/volume (~10ms per read)
# IBKR data overlaid every greeks_interval seconds
option_quotes_csv_primary: true
option_quotes_csv_dir: ""          # Empty = auto-resolve ../../csv_exports/options
